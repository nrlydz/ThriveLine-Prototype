<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThriveLine</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <div class="splash-screen">

            <img src="ThriveLine.png" alt="ThriveLine Logo" class="logo">

            <h1>ThriveLine</h1>

            <p class="tagline">
                Your digital safety companion
            </p>

            <p class="description">
                Navigate the digital world with confidence.
            </p>

            <button id="startBtn">
                Get Started
                <span>→</span>
            </button>

        </div>

        <!-- ========================================= -->
        <!-- ONBOARDING SCREEN 1 -->
        <!-- ========================================= -->

        <div class="onboarding-screen hidden" id="onboarding1">

            <div class="onboarding-content">

                <div class="onboard-icon">
                    🛡️
                </div>

                <h2>Stay Protected</h2>

                <p>
                    ThriveLine detects scams, phishing,
                    suspicious links and grooming attempts
                    before they become a threat.
                </p>

                <div class="progress-dots">
                    <span class="active-dot"></span>
                    <span></span>
                    <span></span>
                </div>

                <button id="nextBtn1">
                    Continue →
                </button>

            </div>

        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
